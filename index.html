<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fruit Ninja 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="webgl"></canvas>
    <canvas id="overlay"></canvas>

    <div id="hud" class="hidden">
      <div id="score-panel">
        <span id="score-icon">🍉</span>
        <span id="score">0</span>
      </div>
      <div id="best-panel">BEST <span id="best">0</span></div>
      <div id="lives-panel">
        <span class="life" data-life="0"></span>
        <span class="life" data-life="1"></span>
        <span class="life" data-life="2"></span>
      </div>
    </div>

    <div id="banner" class="hidden"></div>

    <div id="menu-screen" class="screen">
      <div class="logo">
        <span class="logo-fruit">
          <span style="--c:#e23b3b">F</span><span style="--c:#ef8b2c">r</span><span style="--c:#f0c020">u</span><span style="--c:#3fae4b">i</span><span style="--c:#2f8f3e">t</span>
        </span>
        <span class="logo-ninja">
          <span style="--c:#d8dde2">N</span><span style="--c:#b9c0c7">i</span><span style="--c:#cdd3d9">n</span><span style="--c:#a9b1b9">j</span><span style="--c:#dfe4e9">a</span>
        </span>
        <span class="logo-3d">3D</span>
      </div>
      <p class="subtitle">Slice the fruit — avoid the bombs!</p>
      <button id="play-btn" class="big-btn">PLAY</button>
      <p class="hint">Drag with mouse or finger to swing your blade</p>
    </div>

    <div id="gameover-screen" class="screen hidden">
      <h1 class="title-over">GAME OVER</h1>
      <p id="final-score" class="final-score">Score: 0</p>
      <p id="new-best" class="new-best hidden">★ NEW BEST ★</p>
      <button id="replay-btn" class="big-btn">PLAY AGAIN</button>
    </div>

    <div id="loading">Loading…</div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
