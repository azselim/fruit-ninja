<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fruit Ninja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="webgl"></canvas>
    <canvas id="overlay"></canvas>

    <div id="hud" class="hidden">
      <div id="score-panel">
        <span id="score-icon">🍉</span>
        <span id="score">0</span>
      </div>
      <div id="best-panel">BEST <span id="best">0</span></div>
      <div id="lives-panel">
        <span class="strike" data-life="0" style="--j:-8deg"></span>
        <span class="strike" data-life="1" style="--j:6deg"></span>
        <span class="strike" data-life="2" style="--j:-4deg"></span>
      </div>
    </div>

    <div id="banner" class="hidden"></div>

    <div id="menu-screen" class="screen">
      <canvas id="logo" width="1100" height="620"></canvas>
      <p class="subtitle">Slice the fruit — avoid the bombs!</p>
      <button id="play-btn" class="big-btn">PLAY</button>
      <p class="hint">Drag with mouse or finger to swing your blade</p>
    </div>

    <div id="gameover-screen" class="screen hidden">
      <h1 class="title-over">GAME OVER</h1>
      <p id="final-score" class="final-score">Score: 0</p>
      <p id="new-best" class="new-best hidden">★ NEW BEST ★</p>
      <button id="replay-btn" class="big-btn">PLAY AGAIN</button>
    </div>

    <div id="loading">Loading…</div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
